<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Reactji Notifications</h1>
    <button id="poll-now" title="Poll now">&#x21bb;</button>
  </div>

  <div id="status-section" class="section">
    <h2>Workspaces</h2>
    <div id="workspaces"></div>
    <div id="last-poll" class="meta"></div>
  </div>

  <div id="reactions-section" class="section">
    <h2>Recent Reactions</h2>
    <div id="reactions-list"></div>
    <div id="no-reactions" class="meta" style="display:none">No reactions yet</div>
  </div>

  <div id="settings-section" class="section">
    <h2>Settings</h2>
    <label>
      <input type="checkbox" id="notifications-enabled" checked>
      Show notifications
    </label>
    <label>
      Poll every
      <select id="poll-interval">
        <option value="1">1 min</option>
        <option value="2" selected>2 min</option>
        <option value="5">5 min</option>
        <option value="10">10 min</option>
      </select>
    </label>
    <label>
      Check last
      <select id="max-messages">
        <option value="10">10 messages</option>
        <option value="20" selected>20 messages</option>
        <option value="50">50 messages</option>
      </select>
    </label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
